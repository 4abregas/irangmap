name: irangmap_app
description: "A new Flutter project for IrangMap MVP."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^13.2.0
  # Firebase
  firebase_core: ^2.32.0
  firebase_auth: ^4.17.6
  cloud_firestore: ^4.17.5
  # Google Maps
  google_maps_flutter: ^2.5.3
  # UI & Utils
  google_mobile_ads: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
